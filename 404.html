<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Metavro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="shared.css">
<style>
.error-page {
  min-height: 100vh; background: rgba(7,8,15,0.5);
  display: flex; align-items: center; justify-content: center;
  text-align: center; position: relative; overflow: hidden;
}
.error-bg {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 60% 70% at 50% 50%, rgba(124,92,252,0.14), transparent 65%);
}
.error-num {
  font-size: clamp(6rem, 18vw, 14rem); font-weight: 800; line-height: 0.9;
  letter-spacing: -0.06em; color: transparent;
  background: linear-gradient(135deg, rgba(124,92,252,0.4), rgba(157,127,255,0.2));
  -webkit-background-clip: text; background-clip: text;
  margin-bottom: 32px; position: relative; z-index: 1;
}
.error-inner { position: relative; z-index: 2; }
.error-title { font-size: 1.5rem; font-weight: 700; color: var(--offwhite); margin-bottom: 12px; }
.error-sub { color: var(--text-muted); font-size: 1rem; margin-bottom: 40px; max-width: 360px; margin-left: auto; margin-right: auto; }
.error-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>
<header class="nav-header scrolled">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><div class="logo-mark"><img src="assets/logo.png" alt="Metavro logo"></div><span class="logo-text">Metavro</span></a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html" class="nav-link">Home</a>
      <a href="services.html" class="nav-link">Services</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link">Contact</a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<section class="error-page">
  <div class="error-bg"></div>
  <div class="container error-inner">
    <div class="error-num">404</div>
    <div class="error-title">This page doesn't exist.</div>
    <p class="error-sub">The page you're looking for has moved, or never existed. Let's get you somewhere useful.</p>
    <div class="error-actions">
      <a href="index.html" class="btn btn-primary">Back to Home</a>
      <a href="contact.html" class="btn btn-ghost">Contact Us</a>
    </div>
  </div>
</section>

<script>
const burger = document.getElementById('hamburger');
const navLinks = document.getElementById('navLinks');
burger.addEventListener('click', () => { burger.classList.toggle('open'); navLinks.classList.toggle('open'); });
</script>
</body>
</html>
